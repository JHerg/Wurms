<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physik-Duell: Masterclass Edition</title>
    <style>
        :root {
            --bg-color: #0f141e;
            --panel-bg: #1e2732;
            --accent-blue: #0984e3;
            --accent-red: #d63031;
            --text-light: #dfe6e9;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-light);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-ui {
            width: 1000px; 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background-color: var(--panel-bg);
            padding: 15px 25px;
            box-sizing: border-box;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
        }

        .player-panel { display: flex; flex-direction: column; gap: 8px; }
        .player-panel.right { align-items: flex-end; }
        .player-name { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .p1-color { color: var(--accent-blue); }
        .p2-color { color: var(--accent-red); }

        .health-bar-container {
            width: 100%; height: 20px; background-color: #111;
            border-radius: 10px; border: 2px solid #333; position: relative; overflow: hidden;
        }
        .health-bar-fill { height: 100%; width: 100%; transition: width 0.3s ease; }
        #hp-fill-1 { background: linear-gradient(90deg, #74b9ff, var(--accent-blue)); }
        #hp-fill-2 { background: linear-gradient(90deg, #ff7675, var(--accent-red)); transform-origin: right; }

        .center-console { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        
        #status-display { font-size: 1.4rem; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .badges { display: flex; gap: 10px; }
        .badge { background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }

        /* NEU: Waffensystem UI */
        #weapon-selector {
            display: flex; gap: 10px; margin-bottom: 10px;
        }
        .weapon-btn {
            background: #2d3436; color: white; border: 2px solid #555; padding: 8px 15px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .weapon-btn:hover { background: #636e72; }
        .weapon-btn.active { border-color: #00cec9; background: rgba(0, 206, 201, 0.2); box-shadow: 0 0 10px rgba(0,206,201,0.5); }

        canvas { border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); cursor: crosshair; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center;
            flex-direction: column; z-index: 100; backdrop-filter: blur(5px); border-radius: 12px;
        }
        #overlay.active { display: flex; }
        #overlay h1 { font-size: 4rem; margin: 0; text-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        #overlay button {
            margin-top: 25px; padding: 15px 40px; font-size: 1.3rem; font-weight: bold; cursor: pointer;
            background-color: #00b894; color: white; border: none; border-radius: 8px; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        #overlay button:hover { transform: scale(1.05); background-color: #00cec9; }
    </style>
</head>
<body>

    <div id="weapon-selector">
        <button id="wpn-standard" class="weapon-btn active">💣 Standard-Bombe</button>
        <button id="wpn-cluster" class="weapon-btn">🎇 Streubombe (Splittert)</button>
    </div>

    <div id="game-ui">
        <div class="player-panel">
            <span class="player-name p1-color">Spieler 1</span>
            <div class="health-bar-container"><div id="hp-fill-1" class="health-bar-fill"></div></div>
            <div id="score-1" class="badge">Siege: 0</div>
        </div>

        <div class="center-console">
            <div id="status-display" class="p1-color">Zielen...</div>
            <div class="badges">
                <div id="wind-badge" class="badge" style="color: #fdcb6e;">Wind: 0.0</div>
                <div id="round-badge" class="badge">Runde 1</div>
            </div>
        </div>

        <div class="player-panel right">
            <span class="player-name p2-color">Spieler 2</span>
            <div class="health-bar-container"><div id="hp-fill-2" class="health-bar-fill"></div></div>
            <div id="score-2" class="badge">Siege: 0</div>
        </div>
    </div>

    <div style="position: relative;">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div id="overlay">
            <h1 id="overlay-title">Runde Beendet!</h1>
            <p id="overlay-subtitle">Spieler X gewinnt die Runde.</p>
            <button id="btn-next">Nächste Runde</button>
        </div>
    </div>

<script>
/**
 * ============================================================================
 * MASTERCLASS ARCHITECTURE
 * 1. Pixel-Perfect Destructible Terrain (Offscreen Canvas Rendering)
 * 2. Multi-Projectile System (Arsenal / Cluster Bombs)
 * ============================================================================
 */

const CONFIG = {
    w: 1000, h: 600,
    gravity: 450,          
    maxWind: 200,
    powerMultiplier: 5.5,
    maxDrag: 180,
    emojis: ['🦆', '🛸', '⛄', '🗿', '🍔', '🦄', '💩', '🦀', '🌵', '🤡', '🦍', '🤖']
};

const WEAPONS = {
    STANDARD: { radius: 6, expRadius: 65, damage: 45, color: '#222', type: 'STANDARD' },
    CLUSTER:  { radius: 8, expRadius: 35, damage: 20, color: '#e17055', type: 'CLUSTER' },
    SHRAPNEL: { radius: 4, expRadius: 30, damage: 15, color: '#fab1a0', type: 'SHRAPNEL' }
};

class MathUtils {
    static clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
    static randomRange(min, max) { return Math.random() * (max - min) + min; }
    static distance(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
    static randomEmoji() { return CONFIG.emojis[Math.floor(Math.random() * CONFIG.emojis.length)]; }
}

// --- PIXEL-PERFECT TERRAIN ---
class Terrain {
    constructor(width, height) {
        this.width = width;
        this.height = height;
        
        // Das Offscreen Canvas speichert die visuelle und physische Karte
        this.canvas = document.createElement('canvas');
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
        
        this.generate();
    }

    generate() {
        this.ctx.clearRect(0, 0, this.width, this.height);
        
        // Komplexe organische Form generieren
        this.ctx.beginPath();
        this.ctx.moveTo(0, this.height);
        
        const offset = Math.random() * 1000;
        for (let x = 0; x <= this.width; x += 10) {
            const base = this.height * 0.7;
            const hill1 = Math.sin((x + offset) / 150) * 80;
            const hill2 = Math.cos((x + offset) / 300) * 60;
            const hill3 = Math.sin((x + offset) / 40) * 15;
            this.ctx.lineTo(x, base - hill1 - hill2 - hill3);
        }
        this.ctx.lineTo(this.width, this.height);
        this.ctx.closePath();

        // Farbe & Verlauf
        const dirtGrad = this.ctx.createLinearGradient(0, this.height * 0.4, 0, this.height);
        dirtGrad.addColorStop(0, '#55efc4'); // Gras Kante
        dirtGrad.addColorStop(0.05, '#2d3436'); // Fels
        dirtGrad.addColorStop(1, '#111');
        
        this.ctx.fillStyle = dirtGrad;
        this.ctx.fill();
        this.ctx.lineWidth = 15;
        this.ctx.strokeStyle = '#00b894'; // Helles Gras
        this.ctx.stroke();
    }

    createCrater(cx, cy, radius) {
        // Pixel-genau ausstanzen mit Radiergummi-Modus
        this.ctx.globalCompositeOperation = 'destination-out';
        this.ctx.beginPath();
        this.ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        this.ctx.fill();
        this.ctx.globalCompositeOperation = 'source-over'; // Reset
    }

    isSolid(x, y) {
        if (x < 0 || x >= this.width || y >= this.height) return false;
        if (y < 0) return false;
        // Lese exakt einen Pixel (Alpha-Kanal) - Performant genug für wenige Checks pro Frame
        const pixel = this.ctx.getImageData(Math.round(x), Math.round(y), 1, 1).data;
        return pixel[3] > 50; // Wenn Alpha > 50, ist dort Boden
    }

    draw(targetCtx) {
        // Zeichne das fertige, durchlöcherte Offscreen-Canvas auf den Hauptbildschirm
        targetCtx.drawImage(this.canvas, 0, 0);
    }
}

class Player {
    constructor(id, color, startX) {
        this.id = id;
        this.color = color;
        this.x = startX;
        this.y = 0;
        this.w = 40;
        this.h = 50;
        this.hp = 100;
        this.score = 0;
        this.avatar = MathUtils.randomEmoji();
    }

    resetForRound() {
        this.hp = 100;
        this.y = 0;
        this.avatar = MathUtils.randomEmoji();
    }

    update(dt, terrain) {
        // Pixel-Perfect Gravity: Fällt, bis der Pixel unter den Füßen solide ist
        let footX = this.x + this.w / 2;
        let footY = this.y + this.h;
        
        if (!terrain.isSolid(footX, footY + 2)) {
            this.y += 300 * dt; // Fallen
        } else {
            // Hügel hochdrücken, falls im Boden festgesteckt
            while (terrain.isSolid(footX, footY) && footY > 0) {
                this.y -= 1;
                footY -= 1;
            }
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
        
        if (this.hp < 40) {
            const shake = (40 - this.hp) * 0.1;
            ctx.translate(MathUtils.randomRange(-shake, shake), MathUtils.randomRange(-shake, shake));
        }

        ctx.font = '45px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        if (this.hp <= 0) {
            ctx.globalAlpha = 0.5;
            ctx.filter = 'grayscale(100%)';
        }

        ctx.fillText(this.avatar, 0, 0);
        
        // HP Balken über dem Kopf für Pro-Feeling
        if (this.hp > 0 && this.hp < 100) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(-20, -35, 40, 6);
            ctx.fillStyle = this.hp > 40 ? '#00b894' : '#d63031';
            ctx.fillRect(-20, -35, 40 * (this.hp/100), 6);
        }
        
        ctx.restore();
    }
}

class Projectile {
    constructor(x, y, vx, vy, stats) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.stats = stats; // Referenz auf WEAPONS
        this.active = true;
        this.trail = [];
        this.hasSplit = false;
    }

    update(dt, wind, gameManager) {
        if (!this.active) return;

        const oldVy = this.vy;
        
        this.vx += wind * dt;
        this.vy += CONFIG.gravity * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 20) this.trail.shift();

        // Out of bounds
        if (this.x < -200 || this.x > CONFIG.w + 200 || this.y > CONFIG.h + 100) {
            this.active = false;
            return;
        }

        // CLUSTER BOMB LOGIK (Trennen am Scheitelpunkt der Parabel)
        if (this.stats.type === 'CLUSTER' && !this.hasSplit) {
            // Wenn Vy von negativ (steigend) auf positiv (fallend) wechselt
            if (oldVy < 0 && this.vy >= 0) {
                this.hasSplit = true;
                this.active = false; // Originalbombe löschen
                
                // 3 kleine Shrapnels spawnen
                for(let i = -1; i <= 1; i++) {
                    let spreadVx = this.vx + (i * 120);
                    let spreadVy = this.vy - 100 + (Math.abs(i) * -50);
                    gameManager.projectiles.push(new Projectile(this.x, this.y, spreadVx, spreadVy, WEAPONS.SHRAPNEL));
                }
                
                // Visueller "Plopp"
                gameManager.particles.spawnMiniPoof(this.x, this.y);
            }
        }
    }

    draw(ctx) {
        if (!this.active) return;

        if (this.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i = 1; i < this.trail.length; i++) {
                ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            const alpha = this.stats.type === 'SHRAPNEL' ? 0.3 : 0.6;
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.lineWidth = this.stats.radius / 1.5;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.stats.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.stats.color;
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(this.x - 2, this.y - 2, this.stats.radius / 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fill();
    }
}

class ParticleSystem {
    constructor() {
        this.particles = [];
        this.explosions = [];
        this.texts = [];
    }

    spawnExplosion(x, y, radius) {
        this.explosions.push({ x, y, radius: 10, maxRadius: radius, alpha: 1.0 });
        
        const count = radius > 40 ? 40 : 20;
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = MathUtils.randomRange(50, 400);
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 150, 
                life: 1.0,
                decay: MathUtils.randomRange(0.5, 2.0),
                color: Math.random() > 0.3 ? '#ff7675' : '#fdcb6e',
                size: MathUtils.randomRange(2, 7)
            });
        }
    }

    spawnMiniPoof(x, y) {
        for (let i = 0; i < 15; i++) {
            const angle = Math.random() * Math.PI * 2;
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * 80, vy: Math.sin(angle) * 80, 
                life: 1.0, decay: 1.5,
                color: '#ecf0f1', size: MathUtils.randomRange(1, 4)
            });
        }
    }

    spawnDamageText(x, y, damage) {
        this.texts.push({ x, y, text: `-${damage}`, life: 1.0 });
    }

    update(dt, wind) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.vx += wind * 0.5 * dt; 
            p.vy += CONFIG.gravity * 0.8 * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= p.decay * dt;
            if (p.life <= 0) this.particles.splice(i, 1);
        }

        for (let i = this.explosions.length - 1; i >= 0; i--) {
            const exp = this.explosions[i];
            exp.radius += 300 * dt; 
            exp.alpha -= 2.0 * dt;
            if (exp.alpha <= 0 || exp.radius >= exp.maxRadius) this.explosions.splice(i, 1);
        }

        for (let i = this.texts.length - 1; i >= 0; i--) {
            const t = this.texts[i];
            t.y -= 60 * dt; 
            t.life -= 1.0 * dt;
            if (t.life <= 0) this.texts.splice(i, 1);
        }
    }

    draw(ctx) {
        this.explosions.forEach(exp => {
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 150, 0, ${exp.alpha * 0.5})`; 
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = `rgba(255, 200, 0, ${exp.alpha})`;
            ctx.stroke();
        });

        this.particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        });

        this.texts.forEach(t => {
            ctx.font = '900 26px Arial';
            ctx.textAlign = 'center';
            const alpha = Math.max(0, t.life);
            ctx.fillStyle = `rgba(255, 50, 50, ${alpha})`;
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.lineWidth = 5;
            ctx.strokeText(t.text, t.x, t.y);
            ctx.fillText(t.text, t.x, t.y);
        });
    }
}

// --- CORE GAME ENGINE ---
class GameManager {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.state = 'IDLE'; 
        this.round = 1;
        this.currentWeapon = WEAPONS.STANDARD;
        
        this.terrain = new Terrain(CONFIG.w, CONFIG.h);
        this.p1 = new Player(1, 'p1-color', 150);
        this.p2 = new Player(2, 'p2-color', CONFIG.w - 190);
        this.currentPlayer = this.p1;
        
        this.particles = new ParticleSystem();
        this.projectiles = []; // NEU: Array für multiple Projektile (Cluster)
        
        this.wind = 0;
        this.screenShake = 0;
        this.mouseX = 0; this.mouseY = 0;
        
        this.setupInputs();
        this.lastTime = performance.now();
        
        // Initiale Positionierung garantieren
        this.p1.update(1.0, this.terrain);
        this.p2.update(1.0, this.terrain);
        
        this.updateUI();
        requestAnimationFrame(this.gameLoop.bind(this));
    }

    setupInputs() {
        // Weapon Selection UI
        document.getElementById('wpn-standard').addEventListener('click', (e) => {
            if (this.state !== 'IDLE') return;
            this.currentWeapon = WEAPONS.STANDARD;
            document.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
        });
        
        document.getElementById('wpn-cluster').addEventListener('click', (e) => {
            if (this.state !== 'IDLE') return;
            this.currentWeapon = WEAPONS.CLUSTER;
            document.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
        });

        this.canvas.addEventListener('mousedown', (e) => {
            if (this.state !== 'IDLE') return;
            const rect = this.canvas.getBoundingClientRect();
            this.mouseX = e.clientX - rect.left;
            this.mouseY = e.clientY - rect.top;

            const cx = this.currentPlayer.x + this.currentPlayer.w / 2;
            const cy = this.currentPlayer.y + this.currentPlayer.h / 2;
            
            if (MathUtils.distance(this.mouseX, this.mouseY, cx, cy) < 120) {
                this.state = 'AIMING';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (this.state === 'AIMING') {
                const rect = this.canvas.getBoundingClientRect();
                this.mouseX = e.clientX - rect.left;
                this.mouseY = e.clientY - rect.top;
            }
        });

        window.addEventListener('mouseup', () => {
            if (this.state === 'AIMING') this.fireProjectile();
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            this.startNewRound();
        });
    }

    fireProjectile() {
        const cx = this.currentPlayer.x + this.currentPlayer.w / 2;
        const cy = this.currentPlayer.y;

        let pullX = cx - this.mouseX;
        let pullY = cy - this.mouseY;

        const dist = Math.hypot(pullX, pullY);
        if (dist > CONFIG.maxDrag) {
            const ratio = CONFIG.maxDrag / dist;
            pullX *= ratio;
            pullY *= ratio;
        }

        this.projectiles.push(new Projectile(cx, cy, pullX * CONFIG.powerMultiplier, pullY * CONFIG.powerMultiplier, this.currentWeapon));
        this.state = 'FIRING';
        this.updateUI();
    }

    checkCollisions() {
        for (let i = this.projectiles.length - 1; i >= 0; i--) {
            const proj = this.projectiles[i];
            if (!proj.active) continue;

            const px = proj.x;
            const py = proj.y;

            // 1. Pixel-Perfect Terrain Kollision
            // Wir checken einen leichten Offset nach unten/vorne basierend auf Geschwindigkeit
            const checkX = px + (proj.vx * 0.01);
            const checkY = py + (proj.vy * 0.01);
            
            if (this.terrain.isSolid(checkX, checkY)) {
                this.handleExplosion(proj);
                continue; // Gehe zum nächsten Projektil
            }

            // 2. Direkter Spieler-Treffer
            const enemy = this.currentPlayer === this.p1 ? this.p2 : this.p1;
            if (px > enemy.x && px < enemy.x + enemy.w && py > enemy.y && py < enemy.y + enemy.h) {
                this.handleExplosion(proj);
            }
        }
    }

    handleExplosion(proj) {
        proj.active = false;
        
        // Explosion & Krater (abhängig von Waffe)
        this.particles.spawnExplosion(proj.x, proj.y, proj.stats.expRadius);
        this.terrain.createCrater(proj.x, proj.y, proj.stats.expRadius);
        
        // Splash Damage
        [this.p1, this.p2].forEach(p => {
            const cx = p.x + p.w / 2;
            const cy = p.y + p.h / 2;
            const dist = MathUtils.distance(proj.x, proj.y, cx, cy);
            
            // Etwas größerer Damage-Radius als der visuelle Krater
            const dmgRadius = proj.stats.expRadius + 15; 
            if (dist < dmgRadius) {
                const damageRatio = Math.max(0.1, 1 - (dist / dmgRadius));
                const damage = Math.round(proj.stats.damage * damageRatio);
                
                p.hp = Math.max(0, p.hp - damage);
                this.particles.spawnDamageText(cx, cy - 30, damage);
                this.screenShake += damage * 0.6; // Kumulativer Shake bei Cluster-Bomben
            }
        });

        this.updateUI();
    }

    checkTurnEnd() {
        // Prüfen, ob noch aktive Bomben oder Shrapnels in der Luft sind
        const hasActiveProjectiles = this.projectiles.some(p => p.active);
        
        if (!hasActiveProjectiles && this.state === 'FIRING') {
            this.state = 'WAITING';
            
            if (this.p1.hp === 0 || this.p2.hp === 0) {
                this.endRound();
            } else {
                // Kurz abwarten, bis Partikel verfliegen, dann Zug wechseln
                setTimeout(() => this.nextTurn(), 1200);
            }
        }
    }

    nextTurn() {
        if (this.state === 'ROUND_OVER') return;
        
        this.currentPlayer = this.currentPlayer === this.p1 ? this.p2 : this.p1;
        this.wind = MathUtils.randomRange(-CONFIG.maxWind, CONFIG.maxWind);
        this.state = 'IDLE';
        this.projectiles = []; // Array säubern
        this.updateUI();
    }

    endRound() {
        this.state = 'ROUND_OVER';
        
        let winnerText = "Unentschieden!";
        if (this.p1.hp > 0 && this.p2.hp <= 0) {
            this.p1.score++; winnerText = "Spieler 1 gewinnt die Runde!";
        } else if (this.p2.hp > 0 && this.p1.hp <= 0) {
            this.p2.score++; winnerText = "Spieler 2 gewinnt die Runde!";
        }

        document.getElementById('score-1').innerText = `Siege: ${this.p1.score}`;
        document.getElementById('score-2').innerText = `Siege: ${this.p2.score}`;
        document.getElementById('overlay-subtitle').innerText = winnerText;
        document.getElementById('overlay').classList.add('active');
    }

    startNewRound() {
        this.round++;
        this.terrain.generate();
        this.p1.resetForRound();
        this.p2.resetForRound();
        
        // P1 und P2 nach Terrain-Generierung neu auf den Boden setzen
        this.p1.update(1.0, this.terrain);
        this.p2.update(1.0, this.terrain);
        
        this.currentPlayer = this.round % 2 === 0 ? this.p2 : this.p1;
        this.wind = 0;
        this.projectiles = [];
        this.state = 'IDLE';
        
        document.getElementById('overlay').classList.remove('active');
        this.updateUI();
    }

    updateUI() {
        document.getElementById('hp-fill-1').style.width = `${this.p1.hp}%`;
        document.getElementById('hp-fill-2').style.width = `${this.p2.hp}%`;

        const status = document.getElementById('status-display');
        status.className = this.currentPlayer.color;
        
        if (this.state === 'IDLE') status.innerText = `Zug: Spieler ${this.currentPlayer.id}`;
        else if (this.state === 'AIMING') status.innerText = `Zielen...`;
        else if (this.state === 'FIRING') status.innerText = `Im Flug...`;
        else if (this.state === 'WAITING') status.innerText = `Abwarten...`;

        document.getElementById('round-badge').innerText = `Runde ${this.round}`;
        
        const windElement = document.getElementById('wind-badge');
        if (Math.abs(this.wind) < 15) windElement.innerText = `Wind: Stille`;
        else if (this.wind > 0) windElement.innerText = `Wind: ${Math.round(this.wind)} >>>`;
        else windElement.innerText = `Wind: <<< ${Math.round(Math.abs(this.wind))}`;
    }

    drawAimLine() {
        const cx = this.currentPlayer.x + this.currentPlayer.w / 2;
        const cy = this.currentPlayer.y;

        let pullX = cx - this.mouseX;
        let pullY = cy - this.mouseY;

        const dist = Math.hypot(pullX, pullY);
        if (dist > CONFIG.maxDrag) {
            const ratio = CONFIG.maxDrag / dist;
            pullX *= ratio;
            pullY *= ratio;
        }

        this.ctx.beginPath();
        this.ctx.moveTo(cx, cy);
        this.ctx.lineTo(cx - pullX, cy - pullY);
        this.ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        this.ctx.lineWidth = 3;
        this.ctx.stroke();

        let simX = cx; let simY = cy;
        let simVx = pullX * CONFIG.powerMultiplier;
        let simVy = pullY * CONFIG.powerMultiplier;

        this.ctx.beginPath();
        this.ctx.moveTo(simX, simY);
        this.ctx.setLineDash([6, 8]);
        
        // Vorschau-Farbe entspricht Waffe
        this.ctx.strokeStyle = this.currentWeapon === WEAPONS.CLUSTER ? 'rgba(225, 112, 85, 0.8)' : 'rgba(255, 255, 255, 0.6)';
        this.ctx.lineWidth = 2;

        const simDt = 0.05; 
        for (let i = 0; i < 35; i++) { 
            simVx += this.wind * simDt;
            simVy += CONFIG.gravity * simDt;
            simX += simVx * simDt;
            simY += simVy * simDt;
            this.ctx.lineTo(simX, simY);
        }
        this.ctx.stroke();
        this.ctx.setLineDash([]);
    }

    gameLoop(currentTime) {
        let dt = (currentTime - this.lastTime) / 1000;
        this.lastTime = currentTime;
        if (dt > 0.05) dt = 0.05; // Hard-Cap gegen Lag-Durchschlagen

        // --- UPDATE ---
        this.p1.update(dt, this.terrain);
        this.p2.update(dt, this.terrain);
        this.particles.update(dt, this.wind);

        if (this.state === 'FIRING') {
            this.projectiles.forEach(p => p.update(dt, this.wind, this));
            this.checkCollisions();
            this.checkTurnEnd();
        }

        if (this.screenShake > 0) {
            this.screenShake -= 30 * dt;
            if (this.screenShake < 0) this.screenShake = 0;
        }

        // --- RENDER ---
        this.ctx.save();
        
        if (this.screenShake > 0) {
            const maxShake = Math.min(this.screenShake, 20); // Cap
            const dx = MathUtils.randomRange(-maxShake, maxShake);
            const dy = MathUtils.randomRange(-maxShake, maxShake);
            this.ctx.translate(dx, dy);
        }

        // Deep Night Sky Hintergrund
        const skyGrad = this.ctx.createLinearGradient(0, 0, 0, CONFIG.h);
        skyGrad.addColorStop(0, '#0a0a1a');
        skyGrad.addColorStop(1, '#2c3e50');
        this.ctx.fillStyle = skyGrad;
        this.ctx.fillRect(0, 0, CONFIG.w, CONFIG.h);

        // Render Order: Terrain -> Players -> Aim -> Projectiles -> Particles
        this.terrain.draw(this.ctx);
        this.p1.draw(this.ctx);
        this.p2.draw(this.ctx);
        
        if (this.state === 'AIMING') this.drawAimLine();
        this.projectiles.forEach(p => p.draw(this.ctx));
        this.particles.draw(this.ctx);

        this.ctx.restore();

        requestAnimationFrame(this.gameLoop.bind(this));
    }
}

window.onload = () => {
    const game = new GameManager();
};
</script>
